<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPX Route Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page-bg" aria-hidden="true"></div>
    <main class="layout">
        <section class="panel" aria-label="Controls">
            <h1>GPX Route Viewer</h1>
            <p class="subtitle">Render one or many GPX files on OpenStreetMap.</p>

            <div class="actions">
                <label class="upload-btn" for="gpxInput">Upload GPX Files</label>
                <input id="gpxInput" type="file" accept=".gpx,application/gpx+xml,application/xml,text/xml" multiple />
                <button id="resolveLocationsBtn" type="button" class="secondary compact">Resolve locations</button>
                <div class="secondary-row">
                    <button id="clearFocusBtn" type="button" class="secondary compact">Clear focus</button>
                    <button id="clearBtn" type="button" class="secondary compact">Clear map</button>
                </div>
            </div>

            <p id="status" role="status" aria-live="polite">Choose files to begin.</p>

            <div class="file-list-wrap">
                <h2>Loaded files</h2>
                <ul id="fileList"></ul>
            </div>
        </section>

        <div id="panelResizer" class="panel-resizer" role="separator" aria-orientation="vertical"
            aria-label="Resize side panel" tabindex="0"></div>

        <section class="map-wrap" aria-label="Map">
            <div id="map"></div>
            <div class="map-controls" aria-label="Map controls">
                <label class="map-style-toggle" for="mapStyleToggle">
                    <input id="mapStyleToggle" type="checkbox" checked />
                    <span class="toggle-track" aria-hidden="true"><span class="toggle-knob"></span></span>
                    <span class="toggle-label" aria-live="polite"></span>
                </label>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>

</html>
